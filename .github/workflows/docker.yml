# docker.yml

```yaml
name: Build and Push Docker Image

on:
  push:
    branches:
      - main
      - master

permissions:
  contents: read
  packages: write

jobs:

  docker:

    runs-on: ubuntu-latest

    steps:

      - uses: actions/checkout@v4

      - name: Setup QEMU
        uses: docker/setup-qemu-action@v3

      - name: Setup Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & Push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64

          tags: |
            ghcr.io/${{ github.repository_owner }}/flowquest-backend:latest
            ghcr.io/${{ github.repository_owner }}/flowquest-backend:${{ github.sha }}