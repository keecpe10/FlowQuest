services:
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-panupongdonkrathok16}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-Donkrathok16}
      POSTGRES_DB: ${POSTGRES_DB:-flowquest_db}
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    restart: always
    ports:
      - "6381:6379"
    volumes:
      - redis_data2:/data

  backend:
    image: ghcr.io/${GITHUB_USER:-keecpe10}/flowquest-backend:main
    restart: always
    ports:
      - "5001:5001"
    environment:
      - POSTGRES_HOST=db
      - POSTGRES_USER=${POSTGRES_USER:-panupongdonkrathok16}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-Donkrathok16}
      - POSTGRES_DB=${POSTGRES_DB:-flowquest_db}
      - POSTGRES_PORT=5432
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - SECRET_KEY=${SECRET_KEY:-dev_secret_key}
      - CORS_ORIGINS=${CORS_ORIGINS:-*}
    volumes:
      - ./backend/uploads:/app/uploads
    depends_on:
      - db
      - redis

  frontend:
    image: ghcr.io/${GITHUB_USER:-keecpe10}/flowquest-frontend:main
    restart: always
    ports:
      - "8080:80"
    depends_on:
      - backend

volumes:
  pgdata:
  redis_data2:
